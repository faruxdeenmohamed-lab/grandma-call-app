<body>

<button class="toggle" onclick="toggleDark()">🌙</button>
<h1>GRANDMA CALL APP</h1>
<button class="add" onclick="openModal()">Add Contact</button>
<div class="container" id="contacts"></div>

<div id="contactModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; align-items:center; justify-content:center;">
    <div style="background:#2c2c2e; width:90%; max-width:350px; border-radius:30px; padding:20px; color:white; position:relative;">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
            <button onclick="closeModal()" style="background:none; border:none; color:white; font-size:24px; cursor:pointer;">✕</button>
            <button onclick="saveContact()" style="background:none; border:none; color:white; font-size:24px; cursor:pointer;">✓</button>
        </div>

        <div id="modalAvatar" style="width:120px; height:120px; background:#4a4a4c; border-radius:50%; margin:0 auto; display:flex; align-items:center; justify-content:center; font-size:50px; overflow:hidden;">G</div>
        
        <button onclick="document.getElementById('photoInput').click()" style="background:#3a3a3c; color:#0A84FF; border:none; border-radius:15px; padding:8px 15px; margin:15px auto; display:block; cursor:pointer; font-weight:bold;">Add Photo</button>

        <div style="background:#3a3a3c; border-radius:15px; overflow:hidden; text-align:left;">
            <input type="text" id="modalName" placeholder="Name" style="width:100%; background:none; border:none; border-bottom:1px solid #545456; padding:15px; color:white; outline:none;">
            <input type="text" id="modalNumber" placeholder="Phone Number" style="width:100%; background:none; border:none; padding:15px; color:white; outline:none;">
        </div>
    </div>
</div>

<input type="file" id="photoInput" accept="image/*" style="display:none;">

<footer>By FARDEEN</footer>

<script>
let contacts = [{name:"Fardeen", number:"1234567890", photo:null}];
let editIndex = null;
let currentPhoto = null;

function renderContacts(){
    const container = document.getElementById("contacts");
    container.innerHTML = "";
    contacts.forEach((c, i) => {
        // Use photo if exists, otherwise show first letter
        const displayImg = c.photo ? `<img src="${c.photo}">` : `<div style="width:120px; height:120px; background:#ccc; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:40px; margin:0 auto;">${c.name[0]}</div>`;
        
        container.innerHTML += `
            <div class="card">
                <div class="menu">
                    <button onclick="toggleMenu(${i})">⋮</button>
                    <div class="menu-options" id="menu${i}">
                        <button onclick="openModal(${i})">Edit</button>
                        <button onclick="deleteContact(${i})">Delete</button>
                    </div>
                </div>
                ${displayImg}
                <div class="name">${c.name}</div>
                <button class="call" onclick="callNumber('${c.number}')">Call</button>
            </div>`;
    });
}

function openModal(index = null) {
    editIndex = index;
    const modal = document.getElementById("contactModal");
    modal.style.display = "flex";
    
    if (index !== null) {
        document.getElementById("modalName").value = contacts[index].name;
        document.getElementById("modalNumber").value = contacts[index].number;
        currentPhoto = contacts[index].photo;
        updateModalAvatar(contacts[index].name, currentPhoto);
    } else {
        document.getElementById("modalName").value = "";
        document.getElementById("modalNumber").value = "";
        currentPhoto = null;
        updateModalAvatar("?", null);
    }
}

function closeModal() {
    document.getElementById("contactModal").style.display = "none";
}

function updateModalAvatar(name, photo) {
    const avatar = document.getElementById("modalAvatar");
    if (photo) {
        avatar.innerHTML = `<img src="${photo}" style="width:100%; height:100%; object-fit:cover;">`;
    } else {
        avatar.innerHTML = name ? name[0].toUpperCase() : "?";
    }
}

document.getElementById("photoInput").addEventListener("change", function(e) {
    const file = e.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = (event) => {
            currentPhoto = event.target.result;
            updateModalAvatar(document.getElementById("modalName").value, currentPhoto);
        };
        reader.readAsDataURL(file);
    }
});

function saveContact() {
    const name = document.getElementById("modalName").value;
    const number = document.getElementById("modalNumber").value;

    if (!name || !number) return alert("Please enter name and number");

    const newContact = { name, number, photo: currentPhoto };

    if (editIndex !== null) {
        contacts[editIndex] = newContact;
    } else {
        contacts.push(newContact);
    }

    closeModal();
    renderContacts();
}

function deleteContact(i) {
    if(confirm("Delete Contact?")) {
        contacts.splice(i, 1);
        renderContacts();
    }
}

function toggleMenu(i) {
    const menu = document.getElementById("menu"+i);
    menu.style.display = menu.style.display == "block" ? "none" : "block";
}

function callNumber(num) { window.location.href = "tel:" + num; }
function toggleDark() { document.body.classList.toggle("dark"); }

renderContacts();
</script>
</body>
