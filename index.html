<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRANDMA CALL APP</title>
    <style>
        :root {
            --bg-color: #f2f2f2;
            --card-bg: #ffffff;
            --text-color: #000000;
            --ios-blue: #0A84FF;
            --ios-red: #FF3B30;
            --ios-dark-bg: #1c1c1e;
            --ios-input-bg: #2c2c2e;
        }

        body {
            font-family: -apple-system, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 20px;
            text-align: center; transition: 0.3s;
        }

        .dark {
            --bg-color: #000000;
            --card-bg: #1c1c1e;
            --text-color: #ffffff;
        }

        /* HEADER AREA */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            position: relative;
        }

        /* TOP 3-DOT MENU */
        .top-menu { position: relative; }
        .top-menu-btn { 
            background: none; border: none; font-size: 32px; 
            color: var(--text-color); cursor: pointer; padding: 10px;
        }
        .top-menu-options { 
            display: none; position: absolute; right: 0; top: 50px;
            background: var(--card-bg); border-radius: 15px; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.3); z-index: 2000; 
            min-width: 180px; overflow: hidden; border: 1px solid rgba(128,128,128,0.2);
        }
        .top-menu-options button { 
            display: block; width: 100%; padding: 15px 20px; border: none; background: none; 
            cursor: pointer; font-size: 18px; font-weight: bold; color: var(--text-color);
            text-align: left; border-bottom: 0.5px solid rgba(128,128,128,0.2);
        }

        .add-btn { 
            margin-bottom: 30px; padding: 18px 40px; font-size: 22px; 
            border: none; border-radius: 20px; background: #2196F3; 
            color: white; cursor: pointer; font-weight: bold; 
        }

        /* CONTACT CARDS (BIGGER SIZES) */
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 30px; }
        .card { 
            background: var(--card-bg); padding: 30px; border-radius: 35px; width: 240px; 
            position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
        }
        .card img, .card .initial-circle { width: 160px; height: 160px; border-radius: 50%; object-fit: cover; margin: 0 auto 15px auto; }
        .card .initial-circle { background: #e0e0e0; display: flex; align-items: center; justify-content: center; font-size: 70px; color: #555; }
        .name { font-size: 32px; font-weight: 900; margin-bottom: 20px; }
        .call-btn { 
            background: #4CAF50; color: white; border: none; padding: 22px; width: 100%; 
            border-radius: 25px; cursor: pointer; font-size: 26px; font-weight: bold;
        }

        /* IOS EDIT MODAL */
        #editModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--ios-dark-bg); z-index: 3000; flex-direction: column; color: white; overflow-y: auto;
        }
        .modal-header { display: flex; justify-content: space-between; padding: 25px; font-size: 32px; }
        .avatar-section { margin-top: 20px; display: flex; flex-direction: column; align-items: center; }
        .big-avatar { width: 180px; height: 180px; background: #4a4a4c; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 100px; overflow: hidden; }
        .big-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .input-list { background: var(--ios-input-bg); margin: 30px 20px; border-radius: 20px; overflow: hidden; text-align: left; }
        .input-list input { width: 100%; background: none; border: none; padding: 22px; color: white; font-size: 20px; outline: none; border-bottom: 0.5px solid #3a3a3c; }

        footer { margin: 60px 0; opacity: 0.5; font-size: 16px; }
    </style>
</head>
<body>

<header>
    <div style="width: 50px;"></div> <h1>GRANDMA CALL APP</h1>
    <div class="top-menu">
        <button class="top-menu-btn" onclick="toggleTopMenu(event)">⋮</button>
        <div class="top-menu-options" id="topMenuOptions">
            <button onclick="toggleDark()">🌙 Toggle Theme</button>
            <button onclick="openModal()">➕ Add Contact</button>
        </div>
    </div>
</header>

<button class="add-btn" onclick="openModal()">+ Add New Contact</button>

<div class="container" id="contactsGrid"></div>

<div id="editModal">
    <div class="modal-header">
        <span onclick="closeModal()">✕</span>
        <span style="color: #34C759;" onclick="saveContact()">✓</span>
    </div>
    <div class="avatar-section">
        <div class="big-avatar" id="modalAvatar">G</div>
        <div style="display:flex; gap:20px; margin-top:20px;">
            <button style="color:var(--ios-blue); background:none; border:none; font-size:20px; font-weight:bold;" onclick="document.getElementById('fileInput').click()">Add Photo</button>
            <button id="removeBtn" style="color:var(--ios-red); background:none; border:none; font-size:20px; font-weight:bold; display:none;" onclick="removePhoto()">Remove</button>
        </div>
    </div>
    <div class="input-list">
        <input type="text" id="nameInp" placeholder="Name" oninput="updateInitial()">
        <input type="text" id="compInp" placeholder="Company/Room No.">
        <input type="tel" id="numInp" placeholder="Phone Number">
    </div>
    <button onclick="deleteCurrentContact()" id="modalDeleteBtn" style="color:var(--ios-red); background:none; border:none; font-size:20px; font-weight:bold; margin-top:20px;">Delete Contact</button>
</div>

<input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleImage(this)">

<footer>By FARDEEN</footer>

<script>
    let contacts = JSON.parse(localStorage.getItem('grandma_contacts')) || [
        {name: "Giri Roommate", number: "9360697683", photo: null, company: "327"}
    ];
    let editIdx = null;
    let currentPhoto = null;

    function render() {
        const grid = document.getElementById("contactsGrid");
        grid.innerHTML = "";
        contacts.forEach((c, i) => {
            const avatar = c.photo ? `<img src="${c.photo}">` : `<div class="initial-circle">${c.name ? c.name[0].toUpperCase() : '?'}</div>`;
            grid.innerHTML += `
                <div class="card" onclick="openModal(${i})">
                    ${avatar}
                    <div class="name">${c.name}</div>
                    <button class="call-btn" onclick="event.stopPropagation(); window.location.href='tel:${c.number}'">📞 CALL</button>
                </div>`;
        });
        localStorage.setItem('grandma_contacts', JSON.stringify(contacts));
    }

    function toggleTopMenu(event) {
        event.stopPropagation();
        const m = document.getElementById("topMenuOptions");
        m.style.display = m.style.display === "block" ? "none" : "block";
    }

    window.onclick = () => document.getElementById("topMenuOptions").style.display = "none";

    function openModal(idx = null) {
        editIdx = idx;
        document.getElementById("editModal").style.display = "flex";
        document.getElementById("modalDeleteBtn").style.display = idx !== null ? "block" : "none";

        if (idx !== null) {
            document.getElementById("nameInp").value = contacts[idx].name;
            document.getElementById("numInp").value = contacts[idx].number;
            document.getElementById("compInp").value = contacts[idx].company || "";
            currentPhoto = contacts[idx].photo;
        } else {
            document.getElementById("nameInp").value = "";
            document.getElementById("numInp").value = "";
            document.getElementById("compInp").value = "";
            currentPhoto = null;
        }
        updateInitial();
    }

    function updateInitial() {
        const name = document.getElementById("nameInp").value;
        const avatarDiv = document.getElementById("modalAvatar");
        const removeBtn = document.getElementById("removeBtn");
        if (currentPhoto) {
            avatarDiv.innerHTML = `<img src="${currentPhoto}">`;
            removeBtn.style.display = "block";
        } else {
            avatarDiv.innerHTML = name ? name[0].toUpperCase() : "G";
            removeBtn.style.display = "none";
        }
    }

    function handleImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => { currentPhoto = e.target.result; updateInitial(); };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function saveContact() {
        const name = document.getElementById("nameInp").value;
        const number = document.getElementById("numInp").value;
        if (!name || !number) return alert("Enter Name and Number");
        const data = { name, number, photo: currentPhoto, company: document.getElementById("compInp").value };
        if (editIdx !== null) contacts[editIdx] = data;
        else contacts.push(data);
        closeModal();
        render();
    }

    function deleteCurrentContact() {
        if(confirm("Delete this contact?")) {
            contacts.splice(editIdx, 1);
            closeModal();
            render();
        }
    }

    function removePhoto() { currentPhoto = null; updateInitial(); }
    function closeModal() { document.getElementById("editModal").style.display = "none"; }
    function toggleDark() { document.body.classList.toggle("dark"); }

    render();
</script>
</body>
</html>
