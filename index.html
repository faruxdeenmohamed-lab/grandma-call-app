<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grandma Call</title>

<style>
body {
    font-family: -apple-system, sans-serif;
    margin: 0;
    padding: 15px;
    text-align: center;
    background: #f2f2f2;
}

h1 { font-size: 20px; }

.add-btn {
    padding: 15px 30px;
    border: none;
    border-radius: 20px;
    background: #007AFF;
    color: white;
    font-size: 18px;
    margin: 15px 0;
}

.container {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 20px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    position: relative;
}

.menu {
    position:absolute;
    top:10px;
    right:10px;
    cursor:pointer;
    font-size:18px;
}

.avatar {
    width:90px;
    height:90px;
    border-radius:50%;
    margin:auto;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#333;
    color:white;
    font-size:35px;
    overflow:hidden;
}

.avatar img
    
    {
    width:100%;
    height:100%;
    object-fit:cover;
}

.name { margin:10px 0; }

.call-btn {
    background:#34C759;
    color:white;
    border:none;
    padding:12px;
    width:100%;
    border-radius:15px;
}

/* MODAL */
.modal {
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.5);
    display:none;
    justify-content:center;
    align-items:center;
}

.form-box {
    background:white;
    padding:20px;
    border-radius:20px;
    width:90%;
    max-width:300px;
}

.form-box input {
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:10px;
    border:1px solid #ccc;
}

.form-box button {
    padding:10px;
    border:none;
    border-radius:10px;
    margin-top:10px;
    width:100%;
}

.save-btn { background:#007AFF; color:white; }
.delete-btn { background:red; color:white; }
.cancel-btn { background:#ccc; }

/* FOOTER */
.footer {
    margin-top:20px;
    font-size:14px;
    color:#555;
    text-transform: uppercase;
    font-weight: bold;
}
</style>
</head>

<body>

<h1>GRANDMA CALL APP</h1>
<button class="add-btn" onclick="addContact()">+ New Contact</button>

<div class="container" id="contacts"></div>

<!-- FORM MODAL -->
<div class="modal" id="modal">
    <div class="form-box">
        <h3>Contact</h3>
        <input id="name" placeholder="Name">
        <input id="number" placeholder="Number">
        <input type="file" id="file">
        
        <button class="save-btn" onclick="saveContact()">Save</button>
        <button class="delete-btn" onclick="deleteContact()">Delete</button>
        <button class="cancel-btn" onclick="closeModal()">Cancel</button>
    </div>
</div>

<div class="footer">BY FARDEEN</div>

<script>
let contacts = JSON.parse(localStorage.getItem('contacts')) || [];
let editIndex = null;
let photoData = null;

function render(){
    const box=document.getElementById('contacts');
    box.innerHTML='';

    contacts.forEach((c,i)=>{
        const avatar = c.photo ? `<img src="${c.photo}">` : c.name[0].toUpperCase();

        box.innerHTML += `
        <div class="card">
            <div class="menu" onclick="editContact(${i})">⋮</div>
            <div class="avatar">${avatar}</div>
            <div class="name">${c.name}</div>
            <button class="call-btn" onclick="callNow('${c.number}')">📞 CALL</button>
        </div>`;
    });

    localStorage.setItem('contacts', JSON.stringify(contacts));
}

function addContact(){
    editIndex=null;
    photoData=null;
    openForm();
}

function editContact(i){
    editIndex=i;
    openForm(contacts[i]);
}

function openForm(data={}){
    document.getElementById('modal').style.display="flex";
    document.getElementById('name').value=data.name||"";
    document.getElementById('number').value=data.number||"";
    photoData=data.photo||null;
}

document.getElementById('file').onchange = function(e){
    const reader=new FileReader();
    reader.onload=(ev)=>{
        photoData=ev.target.result;
    };
    reader.readAsDataURL(e.target.files[0]);
};

function saveContact(){
    const name=document.getElementById('name').value;
    const number=document.getElementById('number').value;

    if(!name || !number) return alert("Fill all fields");

    const data={name,number,photo:photoData};

    if(editIndex!==null) contacts[editIndex]=data;
    else contacts.push(data);

    closeModal();
    render();
}

function deleteContact(){
    if(editIndex!==null){
        contacts.splice(editIndex,1);
        closeModal();
        render();
    }
}

function closeModal(){
    document.getElementById('modal').style.display="none";
}

function callNow(num){
    window.location.href="tel:"+num;
}

render();
</script>

</body>
</html>
