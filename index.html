<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grandma Call</title>

<style>
body {
    font-family: -apple-system, sans-serif;
    margin: 0;
    padding: 15px;
    text-align: center;
    background: #f2f2f2;
    overflow-x: hidden;
}

h1 { font-size: 20px; }

.add-btn {
    padding: 15px 30px;
    border: none;
    border-radius: 20px;
    background: #007AFF;
    color: white;
    font-size: 18px;
    margin: 15px 0;
}

.container {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
}

@media (min-width:768px) {
    .container {
        grid-template-columns: repeat(3,1fr);
        max-width:900px;
        margin:auto;
    }
}

.card {
    background: white;
    padding: 15px;
    border-radius: 20px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    position: relative;
}

.menu {
    position:absolute;
    top:10px;
    right:10px;
    cursor:pointer;
}

.avatar {
    width:90px;
    height:90px;
    border-radius:50%;
    margin:auto;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#333;
    color:white;
    font-size:35px;
    overflow:hidden;
}

.avatar img {
    width:100%;
    height:100%;
    object-fit:cover;
}

.name { margin:10px 0; }

.call-btn {
    background:#34C759;
    color:white;
    border:none;
    padding:12px;
    width:100%;
    border-radius:15px;
}
</style>
</head>

<body>

<h1>GRANDMA CALL APP</h1>
<button class="add-btn" onclick="addContact()">+ New Contact</button>

<div class="container" id="contacts"></div>

<input type="file" id="file" accept="image/*" style="display:none">

<script>
let contacts = JSON.parse(localStorage.getItem('contacts')) || [];
let editIndex = null;

function render(){
    const box=document.getElementById('contacts');
    box.innerHTML='';

    contacts.forEach((c,i)=>{
        const avatar = c.photo ? `<img src="${c.photo}">` : c.name[0].toUpperCase();

        box.innerHTML += `
        <div class="card">
            <div class="menu" onclick="editContact(${i})">⋮</div>
            <div class="avatar">${avatar}</div>
            <div class="name">${c.name}</div>
            <button class="call-btn" onclick="callNow('${c.number}')">📞 CALL</button>
        </div>`;
    });

    localStorage.setItem('contacts', JSON.stringify(contacts));
}

function addContact(){
    editIndex=null;
    openForm();
}

function editContact(i){
    editIndex=i;
    openForm(contacts[i]);
}

function openForm(data={}){
    let name=prompt("Name",data.name||"");
    if(!name) return;

    let number=prompt("Number",data.number||"");
    if(!number) return;

    let addPhoto=confirm("Add photo?");

    if(addPhoto){
        document.getElementById('file').click();
        document.getElementById('file').onchange=(e)=>{
            const reader=new FileReader();
            reader.onload=(ev)=>{
                saveData(name,number,ev.target.result);
            };
            reader.readAsDataURL(e.target.files[0]);
        };
    } else {
        saveData(name,number,data.photo||null);
    }
}

function saveData(name,number,photo){
    const data={name,number,photo};

    if(editIndex!==null) contacts[editIndex]=data;
    else contacts.push(data);

    render();
}

function callNow(num){
    window.location.href="tel:"+num;
}

render();
</script>

</body>
</html>
