<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Grandma Call</title>

<style>
:root {
    --bg-color: #f2f2f2;
    --card-bg: #ffffff;
    --text-color: #000000;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg-color);
    margin: 0;
    padding: 15px;
    text-align: center;
    overflow-x: hidden;
}

h1 {
    font-size: 20px;
    margin-bottom: 20px;
}

.add-btn {
    padding: 15px 30px;
    font-size: 18px;
    border-radius: 20px;
    border: none;
    background: #007AFF;
    color: white;
    margin-bottom: 20px;
}

.container {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
}

@media (min-width: 768px) {
    .container {
        grid-template-columns: repeat(3, 1fr);
        max-width: 900px;
        margin: auto;
    }
}

.card {
    background: var(--card-bg);
    padding: 15px;
    border-radius: 25px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.initial-circle {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: #333;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 35px;
    margin: auto;
}

.name {
    font-size: 18px;
    margin: 10px 0;
}

.call-btn {
    background: #34C759;
    color: white;
    border: none;
    padding: 12px;
    width: 100%;
    border-radius: 15px;
    font-size: 16px;
}
</style>
</head>

<body>

<h1>GRANDMA CALL APP</h1>
<button class="add-btn" onclick="addContact()">+ New Contact</button>

<div class="container" id="contacts"></div>

<script>
let contacts = JSON.parse(localStorage.getItem('contacts')) || [];

function render() {
    const box = document.getElementById('contacts');
    box.innerHTML = '';

    contacts.forEach((c, i) => {
        box.innerHTML += `
        <div class="card">
            <div class="initial-circle">${c.name[0].toUpperCase()}</div>
            <div class="name">${c.name}</div>
            <button class="call-btn" onclick="callNow('${c.number}')">📞 CALL</button>
        </div>`;
    });

    localStorage.setItem('contacts', JSON.stringify(contacts));
}

function addContact() {
    let name = prompt("Enter Name");
    let number = prompt("Enter Number");

    if(name && number) {
        contacts.push({name, number});
        render();
    }
}

function callNow(num) {
    window.location.href = "tel:" + num;
}

render();
</script>

</body>
</html>
